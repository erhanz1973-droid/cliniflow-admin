# Render Blueprint (optional): connect repo → New Blueprint → this file
# If you already created the Web Service manually, set Dashboard values to match below instead of duplicating the service.
services:
  - type: web
    name: cliniflow-admin
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
